<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bubble Shooter Cat Rescue Privacy Policy</title>
  <meta name="description" content="Privacy Policy for Bubble Shooter Cat Rescue, a 13+ bubble shooter puzzle game." />
  <style>
    :root {
      --bg1: #07143a;
      --bg2: #123f7a;
      --bg3: #7b39d6;
      --glass: rgba(255,255,255,.14);
      --glass-2: rgba(255,255,255,.2);
      --line: rgba(255,255,255,.22);
      --text: #f9fdff;
      --muted: rgba(249,253,255,.78);
      --soft: rgba(249,253,255,.62);
      --accent: #8ff7ff;
      --accent2: #ffd75d;
      --danger: #ff9ecb;
      --shadow: rgba(0,0,0,.28);
      font-family: "Segoe UI","SF Pro Text","Noto Sans",Arial,sans-serif;
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(92, 238, 255, .22), transparent 30%),
        radial-gradient(circle at 80% 12%, rgba(255, 215, 93, .16), transparent 22%),
        radial-gradient(circle at bottom left, rgba(255, 119, 216, .18), transparent 28%),
        linear-gradient(140deg, var(--bg1), var(--bg2) 46%, var(--bg3));
      padding: 20px 14px 42px;
    }
    .page { max-width: 980px; margin: 0 auto; }
    .glass {
      background: linear-gradient(135deg, var(--glass-2), var(--glass));
      border: 1px solid var(--line);
      box-shadow: 0 22px 44px var(--shadow), inset 0 1px 0 rgba(255,255,255,.16);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .hero {
      border-radius: 28px;
      padding: 26px;
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 18px;
      align-items: center;
    }
    .logo {
      width: 112px;
      height: 112px;
      border-radius: 26px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,.42);
      background: rgba(255,255,255,.12);
      box-shadow: 0 12px 26px rgba(0,0,0,.26);
    }
    .logo img { width: 100%; height: 100%; object-fit: cover; display: block; }
    h1 { margin: 0; font-size: clamp(28px, 4vw, 42px); letter-spacing: -.02em; }
    h2 { margin: 8px 0 0; font-size: clamp(16px, 2vw, 20px); color: var(--muted); }
    .intro { margin: 14px 0 0; color: var(--muted); line-height: 1.65; font-size: 15px; }
    .chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.11);
      border: 1px solid rgba(255,255,255,.18);
      font-size: 13px;
      font-weight: 800;
    }
    .toolbar { margin-top: 18px; display: grid; gap: 12px; }
    .langs {
      border-radius: 22px;
      padding: 14px 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    .lang-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.1);
      color: var(--text);
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      transition: .18s ease;
      font-size: 13px;
      font-weight: 800;
    }
    .lang-btn.active {
      background: rgba(143, 247, 255, .2);
      border-color: rgba(143,247,255,.82);
    }
    .note {
      border-radius: 18px;
      padding: 14px 16px;
      color: var(--soft);
      font-size: 13px;
      line-height: 1.6;
    }
    .content { margin-top: 18px; display: grid; gap: 14px; }
    .section { border-radius: 22px; padding: 22px; }
    .section h3 { margin: 0 0 10px; font-size: clamp(18px, 2.2vw, 22px); }
    .section p, .section li { color: var(--muted); font-size: 15px; line-height: 1.72; }
    .section ul { margin: 10px 0 0; padding-left: 20px; }
    .section a { color: var(--accent); font-weight: 800; text-decoration: none; }
    .section a:hover { text-decoration: underline; }
    .tag {
      display: inline-block;
      margin: 4px 6px 4px 0;
      padding: 6px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,.1);
      color: var(--text);
      border: 1px solid rgba(255,255,255,.14);
      font-size: 12px;
      font-weight: 800;
    }
    .footer { margin-top: 18px; border-radius: 22px; padding: 16px 18px; color: var(--soft); font-size: 13px; line-height: 1.6; }
    @media (max-width: 720px) {
      body { padding: 14px 10px 30px; }
      .hero { grid-template-columns: 1fr; padding: 22px; }
      .logo { width: 92px; height: 92px; border-radius: 22px; }
      .section { padding: 18px; }
    }
  </style>
</head>

        summaryTitle: "1. Quick Summary",
        summaryHtml: "<p>In the current version, Bubble Shooter Cat Rescue does not ask you to create an account and does not require your name, email address, phone number, precise location, camera, microphone, contacts, photos, or address book.</p><p>The app may use local gameplay information, such as level progress, score, stars, settings, boosters, and game state, to provide and improve the game experience. The app also uses Google AdMob to show optional rewarded ads and occasional interstitial ads. Gameplay progress is intended to stay on your device unless a future version clearly introduces online services and updates this policy.</p>",

        adsTitle: "4. Advertising, Analytics, Purchases, and Third Parties",

        useTitle: "5. How Information Is Used",

        europeTitle: "6. Players in Europe: GDPR/UK GDPR Information",
        europeHtml: "<p>If you are in the European Economic Area, the United Kingdom, or Switzerland, you may have rights under data protection law. Depending on your situation, these may include the right to access, correct, delete, restrict, or object to certain processing, withdraw consent where processing is based on consent, and complain to your local data protection authority.</p><p>Most gameplay information is stored locally on your device. You can delete it by clearing the app's storage or uninstalling the app. For advertising, Google AdMob and its partners may act as independent controllers or processors depending on the ad service and consent choice.</p><p>The main legal bases are providing the game experience you request, legitimate interests in operating and securing the app, and consent where required for advertising-related storage/access or personalized advertising. The app uses Google's User Messaging Platform to request or update consent in Europe where required.</p>",

        europeTitle: "6. Joueurs en Europe: informations RGPD/UK GDPR",
        europeHtml: "<p>Si vous vous trouvez dans l'Espace économique européen, au Royaume-Uni ou en Suisse, vous pouvez disposer de droits en vertu de la législation sur la protection des données. Selon votre situation, ceux-ci peuvent inclure le droit d'accéder, corriger, supprimer, limiter ou vous opposer à certains traitements, retirer votre consentement lorsque le traitement est fondé sur le consentement, et déposer une plainte auprès de votre autorité locale de protection des données.</p><p>La plupart des informations de jeu sont stockées localement sur votre appareil. Vous pouvez les supprimer en effaçant le stockage de l'app ou en désinstallant l'app. Pour la publicité, Google AdMob et ses partenaires peuvent agir comme responsables indépendants ou sous-traitants selon le service publicitaire et votre choix de consentement.</p><p>Les principales bases légales sont la fourniture de l'expérience de jeu demandée, les intérêts légitimes liés au fonctionnement et à la sécurité de l'app, et le consentement lorsque la loi l'exige pour le stockage/l'accès lié à la publicité ou les publicités personnalisées. L'app utilise Google User Messaging Platform pour demander ou mettre à jour le consentement en Europe lorsque nécessaire.</p>",

        adsTitle: "4. Werbung, Analytics, Käufe und Dritte",

        europeTitle: "6. Spieler in Europa: Informationen nach DSGVO/UK GDPR",
        europeHtml: "<p>Wenn du dich im Europäischen Wirtschaftsraum, im Vereinigten Königreich oder in der Schweiz befindest, kannst du Rechte nach Datenschutzrecht haben. Je nach Situation können dazu das Recht auf Auskunft, Berichtigung, Löschung, Einschränkung oder Widerspruch gegen bestimmte Verarbeitungen, der Widerruf einer Einwilligung sowie eine Beschwerde bei deiner lokalen Datenschutzbehörde gehören.</p><p>Die meisten Spielinformationen werden lokal auf deinem Gerät gespeichert. Du kannst sie löschen, indem du den App-Speicher löschst oder die App deinstallierst. Für Werbung können Google AdMob und seine Partner je nach Werbedienst und Einwilligungsentscheidung als unabhängige Verantwortliche oder Auftragsverarbeiter handeln.</p><p>Die wichtigsten Rechtsgrundlagen sind die Bereitstellung des gewünschten Spielerlebnisses, berechtigte Interessen am Betrieb und Schutz der App sowie Einwilligung, wenn das Gesetz sie für werbebezogene Speicherung/Zugriff oder personalisierte Werbung verlangt. Die App nutzt Google User Messaging Platform, um in Europa bei Bedarf Einwilligungen abzufragen oder zu aktualisieren.</p>",

    const storageKey = "bubbleShooterCatRescuePrivacyLang";

    function preferredLang() {
      const query = new URLSearchParams(location.search).get("lang");
      if (query && t[query]) return query;
      const stored = localStorage.getItem(storageKey);
      if (stored && t[stored]) return stored;
      return "en";
    }

    function renderLangButtons(active) {
      const wrap = document.getElementById("langs");
      wrap.innerHTML = "";
      Object.keys(t).forEach((code) => {
        const item = t[code];
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `lang-btn${code === active ? " active" : ""}`;
        btn.textContent = item.label;
        btn.addEventListener("click", () => applyLang(code));
        wrap.appendChild(btn);
      });
    }

    function applyLang(code) {
      const d = t[code] || t.en;
      document.documentElement.lang = code;
      document.title = `${d.subtitle} - ${d.title}`;
      document.getElementById("title").textContent = d.title;
      document.getElementById("subtitle").textContent = d.subtitle;
      document.getElementById("intro").textContent = d.intro;
      document.getElementById("note").textContent = d.note;
      document.getElementById("footer").textContent = d.footer;

      const chips = document.getElementById("chips");
      chips.innerHTML = "";
      d.chips.forEach((text) => {
        const node = document.createElement("span");
        node.className = "chip";
        node.textContent = text;
        chips.appendChild(node);
      });

      const content = document.getElementById("content");
      content.innerHTML = "";
      sections.forEach((key) => {
        const article = document.createElement("article");
        article.className = "section glass";
        article.innerHTML = `<h3>${d[`${key}Title`]}</h3>${d[`${key}Html`]}`;
        content.appendChild(article);
      });

      renderLangButtons(code);
      localStorage.setItem(storageKey, code);
    }

    applyLang(preferredLang());
  </script>
